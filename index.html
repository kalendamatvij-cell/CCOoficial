<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Статут та Правила</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }
        .gradient-bg {
            background: linear-gradient(135deg, #1e3a5f 0%, #0f172a 50%, #1e293b 100%);
        }
        .card-hover {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card-hover:hover {
            transform: translateY(-12px) scale(1.05);
            box-shadow: 0 35px 60px -15px rgba(0, 0, 0, 0.5);
        }
        @keyframes pulse-glow-blue {
            0%, 100% { box-shadow: 0 0 30px rgba(59, 130, 246, 0.3); }
            50% { box-shadow: 0 0 60px rgba(59, 130, 246, 0.6); }
        }
        @keyframes pulse-glow-yellow {
            0%, 100% { box-shadow: 0 0 30px rgba(234, 179, 8, 0.3); }
            50% { box-shadow: 0 0 60px rgba(234, 179, 8, 0.6); }
        }
        .pulse-blue {
            animation: pulse-glow-blue 3s ease-in-out infinite;
        }
        .pulse-yellow {
            animation: pulse-glow-yellow 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        .float-animation {
            animation: float 6s ease-in-out infinite;
        }
    </style>
</head>
<body class="gradient-bg min-h-screen text-gray-100 flex items-center justify-center p-4">
    <!-- Decorative background elements -->
    <div class="absolute top-20 left-10 w-72 h-72 bg-blue-500/10 rounded-full blur-3xl"></div>
    <div class="absolute top-40 right-10 w-96 h-96 bg-yellow-500/10 rounded-full blur-3xl"></div>
    <div class="absolute bottom-10 left-1/2 transform -translate-x-1/2 w-80 h-80 bg-cyan-500/10 rounded-full blur-3xl"></div>

    <div class="w-full max-w-4xl mx-auto relative z-10">
        <!-- Header -->
        <div class="text-center mb-16">
            <h1 class="text-5xl md:text-7xl font-extrabold text-white mb-4 tracking-tight">
                <span class="bg-gradient-to-r from-blue-400 via-cyan-400 to-yellow-400 bg-clip-text text-transparent">Статут та Правила</span>
            </h1>
            <p class="text-xl text-gray-300">Оберіть розділ для перегляду</p>
        </div>

        <!-- Cards Container -->
        <div class="grid md:grid-cols-2 gap-8">
            <!-- ССО Card -->
            <a href="sso.html" class="block card-hover bg-gradient-to-br from-blue-900/70 to-blue-800/70 rounded-3xl p-8 border border-blue-700/50 backdrop-blur-sm pulse-blue float-animation">
                <div class="flex flex-col items-center text-center">
                    <div class="bg-gradient-to-br from-blue-600 to-blue-700 rounded-2xl p-6 mb-6">
                        <svg class="w-16 h-16 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path>
                        </svg>
                    </div>
                    <h2 class="text-3xl font-bold text-white mb-4">ССО</h2>
                    <p class="text-gray-300 mb-6">Сил Спеціальних Операцій</p>
                    <div class="bg-blue-600/20 rounded-xl px-6 py-3 border border-blue-500/30">
                        <span class="text-blue-400 font-semibold">Статут та Правила</span>
                    </div>
                </div>
            </a>

            <!-- ЗСУ Card -->
            <a href="zsu.html" class="block card-hover bg-gradient-to-br from-yellow-900/70 to-yellow-800/70 rounded-3xl p-8 border border-yellow-700/50 backdrop-blur-sm pulse-yellow float-animation" style="animation-delay: 0.5s;">
                <div class="flex flex-col items-center text-center">
                    <div class="bg-gradient-to-br from-yellow-600 to-yellow-700 rounded-2xl p-6 mb-6">
                        <span class="text-5xl">🇺🇦</span>
                    </div>
                    <h2 class="text-3xl font-bold text-white mb-4">ЗСУ</h2>
                    <p class="text-gray-300 mb-6">Збройні Сили України</p>
                    <div class="bg-yellow-600/20 rounded-xl px-6 py-3 border border-yellow-500/30">
                        <span class="text-yellow-400 font-semibold">Військова присяга</span>
                    </div>
                </div>
            </a>
        </div>

        <!-- Footer -->
        <div class="text-center mt-16">
            <p class="text-gray-500 text-sm">© 2026 ССО та ЗСУ</p>
        </div>
    </div>
</body>
</html>
